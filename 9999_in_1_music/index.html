let channel0 = { octave: 4, tickCounter: 0, dataPos: 0, freq: 0, delay: 0, data: channel1data };
let channel1 = { octave: 4, tickCounter: 0, dataPos: 0, freq: 0, delay: 0, data: channel2data };
let channel2 = { octave: 5, tickCounter: 0, dataPos: 0, freq: 0, delay: 0, data: channel3data, rithm: true };

const rithmDivider1 = 12;
const rithmDivider2 = 6;

function channelTick(ch) {
    if (ch.delay > 0) {
        ch.delay--;
    } else {
        channelLoad(ch);
    }    
    if (ch.rithm && ((ch.tickCounter % rithmDivider1) == 0 || (ch.tickCounter % (rithmDivider1 * rithmDivider2)) <= 1)) {
        ch.beeper.set(0);
    } else {
        const oscFrequency = 1250000;
        ch.beeper.set(oscFrequency / ch.freq);
    }
    ch.tickCounter++;
}

function channelLoad(ch) {
    for(;;) {
        const c = ch.data[ch.dataPos];    
        ch.dataPos++;
        switch (c) {
            case 0x80: // Reset
                ch.dataPos++;
                break;
            case 0x81: // Silent
                ch.delay = ch.data[ch.dataPos] - 1;
                ch.dataPos++;
                return;
            case 0x84: // Gosub
                ch.cnt = ch.data[ch.dataPos];
                const id = ch.data[ch.dataPos + 1] + (ch.data[ch.dataPos + 2] << 8);            
                ch.dataPos += 3;
                ch.dataPos1 = ch.dataPos;
                ch.data1 = ch.data;            
                ch.data = subs[id];
                ch.dataPos = 0;
                break;
            case 0x85: // Return
                if (ch.cnt > 1) {
                    ch.cnt--;
                    ch.dataPos = 0;
                } else {
                    ch.dataPos = ch.dataPos1;
                    ch.data = ch.data1;
                }
                break;
            case 0x86: // End
                ch.dataPos = 0;
                break;
            default: // Note
                ch.freq = (notes[c] & 0x7FF) << ch.octave;
                ch.delay = ch.data[ch.dataPos] - 1;
                ch.dataPos++;
                return;
        }
    }
}

let infoTable = document.getElementById("infoTable");
let infoTableRows = [];

const musicAdvanceSeconds = 1 / 3;
const musicUpdateSeconds = 1 / 20;
const musicSpeedSeconds = 1 / 50;

let audioContext = 0;
let preparedSeconds = 0;

function tick() {
    while (preparedSeconds - audioContext.currentTime < musicAdvanceSeconds) {
        // Music
        channelTick(channel0);
        channelTick(channel1);
        channelTick(channel2);
        
        // Make info table
        const infoTableSize = 30;
        if (infoTableRows.length > infoTableSize) {
            infoTableRows.splice(0, infoTableRows.length - infoTableSize);
        }
        infoTableRows.push("<tr><td>" + Math.round(preparedSeconds * 1000) / 1000   
        + "</td><td>" + channel0.freq 
        + "</td><td>" + channel1.freq 
        + "</td><td>" + channel2.freq + "</td></tr>");
    
        // Next time    
        preparedSeconds += musicSpeedSeconds;
    }
    
    // Make info table
    infoTable.innerHTML = "<table><tr><th width=100>Time</th><th width=100>Channel 1</th><th width=100>Channel 2<th width=100>Channel 3</th></tr>" + infoTableRows.join("");
    window.scrollTo(0, 10000000);
}

function Beeper(audioContext, type, gainValue) {
    let gain = audioContext.createGain();
    let oscillator = audioContext.createOscillator();
    oscillator.type = type;
    oscillator.frequency.value = 0;
    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    gain.gain.value = gainValue;
    oscillator.start();

    this.set = function(freq_hz) {
        oscillator.frequency.setValueAtTime(freq_hz, preparedSeconds); // value in hertz
    }
}

let intervalHandle = 0;

function start() {
    if (!intervalHandle) {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            audioContext.resume();
            channel0.beeper = new Beeper(audioContext, "triangle", 0.7);
            channel1.beeper = new Beeper(audioContext, "square", 0.2);
            channel2.beeper = new Beeper(audioContext, "square", 0.2);
        }
        preparedSeconds = audioContext.currentTime + 1;
        channel0.dataPos = 0;
        channel1.dataPos = 0;
        channel2.dataPos = 0;
        intervalHandle = setInterval(tick, musicUpdateSeconds * 1000);
    } else {
        channel0.beeper.set(0);
        channel1.beeper.set(0);
        channel2.beeper.set(0);
        clearInterval(intervalHandle);
        intervalHandle = 0;
    }    
}
